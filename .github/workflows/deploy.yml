name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/bitah23/designhive-admin/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_SENDER_NAME: ${{ secrets.GMAIL_SENDER_NAME }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,JWT_SECRET,WEBHOOK_SECRET,GMAIL_SENDER_EMAIL,GMAIL_SENDER_NAME,GMAIL_REFRESH_TOKEN,GMAIL_CLIENT_ID,GMAIL_CLIENT_SECRET,GHCR_TOKEN
          script: |
            cat > /root/app.env << EOF
            SUPABASE_URL=${SUPABASE_URL}
            SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            JWT_SECRET=${JWT_SECRET}
            WEBHOOK_SECRET=${WEBHOOK_SECRET}
            GMAIL_SENDER_EMAIL=${GMAIL_SENDER_EMAIL}
            GMAIL_SENDER_NAME=${GMAIL_SENDER_NAME}
            GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
            GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
            GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
            EOF
            chmod 600 /root/app.env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u bitah23 --password-stdin

            docker pull ghcr.io/bitah23/designhive-admin/app:latest
            docker stop designhive-app 2>/dev/null || true
            docker rm designhive-app 2>/dev/null || true
            docker run -d \
              --name designhive-app \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /root/app.env \
              ghcr.io/bitah23/designhive-admin/app:latest

            docker image prune -f
