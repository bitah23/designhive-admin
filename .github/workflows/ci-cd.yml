name: CI/CD - Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ghcr.io/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME_BACKEND }}:latest
            ghcr.io/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_SHA: ${{ github.sha }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_SENDER_NAME: ${{ secrets.GMAIL_SENDER_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ssh -i ~/.ssh/key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            bash -s \
              "$REPO" \
              "$ACTOR" \
              "$GHCR_TOKEN" \
              "$DEPLOY_SHA" \
              "$SUPABASE_URL" \
              "$SUPABASE_KEY" \
              "$SUPABASE_SERVICE_ROLE_KEY" \
              "$GMAIL_CLIENT_ID" \
              "$GMAIL_CLIENT_SECRET" \
              "$GMAIL_REFRESH_TOKEN" \
              "$GMAIL_SENDER_EMAIL" \
              "$GMAIL_SENDER_NAME" \
              "$JWT_SECRET" \
            << 'EOF'
          set -e

          GITHUB_REPOSITORY="$1"
          GHCR_ACTOR="$2"
          GHCR_TOKEN="$3"
          DEPLOY_SHA="$4"
          SUPABASE_URL="$5"
          SUPABASE_KEY="$6"
          SUPABASE_SERVICE_ROLE_KEY="$7"
          GMAIL_CLIENT_ID="$8"
          GMAIL_CLIENT_SECRET="$9"
          GMAIL_REFRESH_TOKEN="${10}"
          GMAIL_SENDER_EMAIL="${11}"
          GMAIL_SENDER_NAME="${12}"
          JWT_SECRET="${13}"

          echo "Deploying ${GITHUB_REPOSITORY} @ ${DEPLOY_SHA}..."

          mkdir -p /var/www/designhive-admin
          cd /var/www/designhive-admin

          if [ ! -d .git ]; then
            git clone "https://github.com/${GITHUB_REPOSITORY}.git" .
          else
            git pull origin main
          fi

          {
            echo "PORT=5000"
            echo "NODE_ENV=production"
            echo ""
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_KEY=${SUPABASE_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
            echo ""
            echo "GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}"
            echo "GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}"
            echo "GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}"
            echo "GMAIL_SENDER_EMAIL=${GMAIL_SENDER_EMAIL}"
            echo "GMAIL_SENDER_NAME=${GMAIL_SENDER_NAME}"
            echo ""
            echo "JWT_SECRET=${JWT_SECRET}"
          } > .env
          chmod 600 .env

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin

          docker pull "ghcr.io/${GITHUB_REPOSITORY}/frontend:${DEPLOY_SHA}"
          docker pull "ghcr.io/${GITHUB_REPOSITORY}/backend:${DEPLOY_SHA}"

          docker tag "ghcr.io/${GITHUB_REPOSITORY}/frontend:${DEPLOY_SHA}" "ghcr.io/${GITHUB_REPOSITORY}/frontend:latest"
          docker tag "ghcr.io/${GITHUB_REPOSITORY}/backend:${DEPLOY_SHA}" "ghcr.io/${GITHUB_REPOSITORY}/backend:latest"

          export GITHUB_REPOSITORY
          docker compose up -d --pull always --force-recreate

          docker image prune -f

          echo "Deployment done (${GITHUB_REPOSITORY} @ ${DEPLOY_SHA})"
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/key