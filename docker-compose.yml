services:
  # Frontend service — React + Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: designhive-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - designhive-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend service — Node.js + Express
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: designhive-backend
    ports:
      - "5000:5000"
    environment:
      # These will be overridden by .env file on VPS
      NODE_ENV: production
      PORT: 5000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - designhive-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  designhive-network:
    driver: bridge

volumes:
  # Optional: for persistent logs or data
  backend-logs:
    driver: local