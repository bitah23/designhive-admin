<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-guard.js"></script>
  <title>Dashboard - DesignHive Admin</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    /* ── Dashboard Chat ─────────────────────────────────────── */
    #dash-chat-card {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      margin-bottom: 24px;
    }
    #dash-chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #dash-chat-messages {
      flex: 1;
      height: 340px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .dm { display: flex; flex-direction: column; max-width: 78%; }
    .dm--ai  { align-self: flex-start; }
    .dm--user { align-self: flex-end; }
    .dm--thinking { align-self: flex-start; }
    .dm-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .dm--ai .dm-bubble {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-bottom-left-radius: 4px;
    }
    .dm--user .dm-bubble {
      background: var(--gold);
      color: #000;
      font-weight: 600;
      border-bottom-right-radius: 4px;
    }
    .dm--thinking .dm-bubble {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-style: italic;
    }
    #dash-chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #dash-chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color .15s;
    }
    #dash-chat-input:focus { outline: none; border-color: var(--gold); }
    #dash-chat-send {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    #dash-chat-send:disabled { opacity: .45; cursor: default; }

    /* ── Suggestions list ───────────────────────────────────── */
    #suggestions-section {
      margin-bottom: 20px;
    }
    .sugg-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .sugg-row:last-child { border-bottom: none; }
    .sugg-type {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(255,159,28,.1);
      border: 1px solid rgba(255,159,28,.22);
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .sugg-msg { color: var(--text-secondary); flex: 1; line-height: 1.5; }
    .sugg-apply {
      flex-shrink: 0;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      transition: border-color .15s, color .15s;
    }
    .sugg-apply:hover { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">

        <!-- ── AI Chat ─────────────────────────────────────────── -->
        <div id="dash-chat-card">
          <div id="dash-chat-header">
            <i data-lucide="bot" style="width:16px;height:16px;color:var(--gold)"></i>
            <span style="font-weight:700;font-size:14px;color:var(--text-primary)">AI Assistant</span>
            <span style="font-size:12px;color:var(--text-muted);margin-left:4px">— send campaigns, generate content, pull stats</span>
          </div>
          <div id="dash-chat-messages">
            <div class="dm dm--ai">
              <div class="dm-bubble">Hi! I can send campaigns, schedule emails, generate content, run agents, and pull stats — just tell me what you need.</div>
            </div>
          </div>
          <div id="dash-chat-input-row">
            <textarea id="dash-chat-input" rows="1"
              placeholder="e.g. Send the welcome email to new users…"></textarea>
            <button id="dash-chat-send" title="Send">
              <i data-lucide="send" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>

        <!-- ── AI Suggestions ──────────────────────────────────── -->
        <div id="suggestions-section" style="display:none">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:7px">
              <i data-lucide="sparkles" style="width:13px;height:13px;color:var(--gold)"></i>
              <span style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">AI Insights</span>
              <span id="suggestions-count" style="font-size:11px;color:var(--text-muted)"></span>
            </div>
            <button class="btn btn-ghost btn-sm" id="refresh-suggestions-btn" style="font-size:12px;padding:3px 10px">
              <i data-lucide="refresh-cw" style="width:12px;height:12px"></i>
              Refresh
            </button>
          </div>
          <div id="suggestions-list"></div>
        </div>

        <!-- ── Draft notifications ─────────────────────────────── -->
        <div id="draft-notifications" style="display:none;margin-bottom:20px"></div>

        <!-- ── Stat cards ──────────────────────────────────────── -->
        <div class="grid grid-4 mb-4" id="stat-cards">
          <div class="card dashboard-stat-card skeleton"></div>
          <div class="card dashboard-stat-card skeleton"></div>
          <div class="card dashboard-stat-card skeleton"></div>
          <div class="card dashboard-stat-card skeleton"></div>
        </div>

        <!-- ── Templates table ─────────────────────────────────── -->
        <div class="card">
          <div class="flex-between" style="padding:18px 20px;border-bottom:1px solid var(--border)">
            <span style="color:var(--text-primary);font-weight:700">All Templates / Campaigns</span>
            <a href="/templates.html" class="btn btn-ghost btn-sm">Manage</a>
          </div>
          <div id="templates-table-wrap">
            <div style="padding:16px"><div class="skeleton" style="height:180px"></div></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/dashboard-page.js"></script>
</body>
</html>
