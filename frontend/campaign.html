<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-guard.js"></script>
  <title>Campaign - DesignHive Admin</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">
        <div class="page-header">
          <div>
            <h1>Campaign</h1>
            <p>Select one template, choose recipients, and send with confidence.</p>
          </div>
        </div>

        <div class="grid grid-2" id="campaign-grid" style="margin-bottom:16px">
          <div class="skeleton" style="height:420px"></div>
          <div class="skeleton" style="height:420px"></div>
        </div>

        <div class="flex" style="justify-content:flex-end">
          <button class="btn btn-primary" id="send-campaign-btn" type="button">
            <i data-lucide="send" style="width:16px;height:16px"></i>
            <span id="send-label">Send Campaign</span>
          </button>
        </div>

        <div class="card mt-4" id="results-card" hidden>
          <div style="padding:20px 20px 0">
            <div style="color:var(--text-primary);font-weight:700;font-size:1rem">Send Results</div>
          </div>
          <div style="padding:20px">
            <div class="grid grid-2" style="gap:12px;margin-bottom:16px">
              <div class="card" style="padding:18px;box-shadow:none;background:var(--success-dim)">
                <div id="res-sent" style="font-size:2rem;font-weight:700;color:var(--success)">0</div>
                <div class="label-upper" style="margin-top:8px">Sent</div>
              </div>
              <div class="card" style="padding:18px;box-shadow:none;background:var(--danger-dim)">
                <div id="res-failed" style="font-size:2rem;font-weight:700;color:var(--danger)">0</div>
                <div class="label-upper" style="margin-top:8px">Failed</div>
              </div>
            </div>
            <div id="res-rows" style="display:flex;flex-direction:column;gap:8px"></div>
            <div style="display:flex;justify-content:flex-end;margin-top:14px">
              <button type="button" class="btn btn-outline" id="dismiss-results-btn">Dismiss</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/mock-boot.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/campaign-page.js"></script>
</body>
</html>
