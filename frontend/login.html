<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DesignHive Admin</title>
  <link rel="stylesheet" href="/css/main.css">
</head>

<body>
  <div class="login-shell">
    <div class="login-box">
      <div class="login-logo">
        <div class="brand">Design<span>Hive</span></div>
        <div class="sub">Sign in to your admin panel</div>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@example.com" required
            autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-full" id="login-btn"
          style="justify-content:center;margin-top:8px">
          Sign In
        </button>
        <p id="login-error"
          style="color:var(--danger);font-size:0.82rem;margin-top:10px;display:none;text-align:center"></p>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/mock-boot.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/login.js"></script>
</body>

</html>
