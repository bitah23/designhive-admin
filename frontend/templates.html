<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-guard.js"></script>
  <title>Templates - DesignHive Admin</title>
  <link rel="stylesheet" href="/css/app.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">
        <div class="page-header">
          <div>
            <h1>Email Templates</h1>
            <p>Create, preview, and refine polished outbound email templates.</p>
          </div>
          <button class="btn btn-primary" type="button" id="new-template-btn">
            <i data-lucide="plus" style="width:15px;height:15px"></i>
            New Template
          </button>
        </div>

        <div class="grid grid-3" id="templates-grid">
          <div class="skeleton" style="height:210px"></div>
          <div class="skeleton" style="height:210px"></div>
          <div class="skeleton" style="height:210px"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay hidden" id="template-modal">
    <div class="modal-box" style="max-width:760px">
      <div class="modal-header flex-between">
        <div class="flex-center gap-2">
          <div class="sidebar-logo-mark" style="width:40px;height:40px;border-radius:12px;padding:8px">
            <i data-lucide="file-text" style="width:18px;height:18px;color:var(--gold-strong)"></i>
          </div>
          <span class="title" id="modal-template-title">New Template</span>
        </div>
        <button class="btn-icon" type="button" id="close-template-modal" aria-label="Close dialog">
          <i data-lucide="x" style="width:15px;height:15px"></i>
        </button>
      </div>
      <form id="template-form">
        <div class="modal-body">

          <!-- AI Generation Panel (hidden by default) -->
          <div id="ai-gen-panel" style="display:none;margin-bottom:20px;padding:18px 20px;
               background:rgba(255,159,28,0.05);border:1px solid rgba(255,159,28,0.2);
               border-radius:12px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
              <i data-lucide="sparkles" style="width:15px;height:15px;color:var(--gold-strong)"></i>
              <span style="font-weight:600;font-size:14px;color:var(--text-primary)">Generate with AI</span>
            </div>
            <div style="margin-bottom:12px">
              <label class="form-label" for="ai-brief">Brief</label>
              <textarea id="ai-brief" class="form-control" rows="2"
                placeholder="Describe the email goal in 1–3 sentences…"
                style="resize:vertical;min-height:64px"></textarea>
            </div>
            <div class="grid grid-2" style="gap:12px;margin-bottom:12px">
              <div>
                <label class="form-label" for="ai-tone">Tone</label>
                <select id="ai-tone" class="form-control">
                  <option value="friendly">Friendly</option>
                  <option value="professional">Professional</option>
                  <option value="urgent">Urgent</option>
                </select>
              </div>
              <div id="ai-cta-text-wrap">
                <label class="form-label" for="ai-cta-text">CTA Button Text</label>
                <input type="text" id="ai-cta-text" class="form-control"
                       placeholder="e.g. Get Started" value="Get Started">
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
              <input type="checkbox" id="ai-include-cta" checked
                     onchange="toggleAiCtaInput(this.checked)">
              <label for="ai-include-cta"
                     style="font-size:13px;color:var(--text-secondary);cursor:pointer">
                Include CTA button
              </label>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button type="button" class="btn btn-outline btn-sm"
                      onclick="closeAiPanel()">Cancel</button>
              <button type="button" class="btn btn-primary btn-sm"
                      id="ai-generate-btn" onclick="generateWithAI()">
                <i data-lucide="sparkles" style="width:13px;height:13px"></i>
                Generate
              </button>
            </div>
          </div>

          <div class="grid grid-2" style="gap:14px;margin-bottom:16px">
            <div>
              <label class="form-label" for="t-title">Template Name</label>
              <input type="text" id="t-title" class="form-control" required>
            </div>
            <div>
              <label class="form-label" for="t-subject">Subject</label>
              <input type="text" id="t-subject" class="form-control" required>
            </div>
          </div>
          <div>
            <div class="flex-between mb-2">
              <label class="form-label" for="html-editor" style="margin:0">Body</label>
              <button type="button" class="btn btn-secondary btn-sm" id="toggle-mode-btn">
                <i data-lucide="code" style="width:12px;height:12px"></i>
                HTML Mode
              </button>
            </div>
            <div id="quill-wrap">
              <div id="quill-editor"></div>
            </div>
            <textarea id="html-editor" class="form-control" style="display:none;min-height:240px;font-family:Consolas, monospace"></textarea>
            <div class="variable-hints">
              <span class="text-muted" style="font-size:12px">Insert variables:</span>
              <button type="button" class="variable-chip" data-variable="{{name}}">{{name}}</button>
              <button type="button" class="variable-chip" data-variable="{{email}}">{{email}}</button>
              <button type="button" class="variable-chip" data-variable="{{date}}">{{date}}</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="cancel-template-btn">Cancel</button>
          <button type="button" class="btn btn-secondary" id="ai-panel-btn"
                  onclick="toggleAiPanel()" style="margin-left:auto">
            <i data-lucide="sparkles" style="width:14px;height:14px;color:var(--gold-strong)"></i>
            Generate with AI
          </button>
          <button type="submit" class="btn btn-primary" id="save-template-btn">
            <i data-lucide="save" style="width:14px;height:14px"></i>
            Save Template
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="preview-modal">
    <div class="modal-box" style="max-width:760px">
      <div class="modal-header flex-between">
        <div class="flex-center gap-2">
          <div class="sidebar-logo-mark" style="width:40px;height:40px;border-radius:12px;padding:8px">
            <i data-lucide="mail" style="width:18px;height:18px;color:var(--gold-strong)"></i>
          </div>
          <span class="title">Email Preview</span>
        </div>
        <button class="btn-icon" type="button" id="close-preview-modal" aria-label="Close dialog">
          <i data-lucide="x" style="width:15px;height:15px"></i>
        </button>
      </div>
      <div class="modal-body" style="background:#F7F7F7">
        <div class="email-preview-shell">
          <iframe class="email-preview-card" id="preview-content" title="Email preview"></iframe>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:center">
        <span class="text-muted" style="font-size:12px">Sample data: John Doe • john@example.com</span>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/templates-page.js"></script>
</body>
</html>
