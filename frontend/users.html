<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-guard.js"></script>
  <title>Users - DesignHive Admin</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">
        <div class="page-header">
          <div>
            <h1>Users</h1>
            <p id="user-count">Loading users...</p>
          </div>
          <div class="input-wrap" style="width:min(100%, 300px)">
            <span class="icon"><i data-lucide="search" style="width:14px;height:14px"></i></span>
            <input type="text" id="search" placeholder="Search by name or email...">
          </div>
        </div>

        <div class="card" id="users-card">
          <div style="padding:16px">
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay hidden" id="email-modal">
    <div class="modal-box" style="max-width:560px">
      <div class="modal-header flex-between">
        <div class="flex-center gap-2">
          <div class="sidebar-logo-mark" style="width:40px;height:40px;border-radius:12px;padding:8px">
            <i data-lucide="mail" style="width:18px;height:18px;color:var(--gold-strong)"></i>
          </div>
          <div class="title" id="email-modal-title">Send Email</div>
        </div>
        <button class="btn-icon" type="button" id="close-email-modal" aria-label="Close dialog">
          <i data-lucide="x" style="width:15px;height:15px"></i>
        </button>
      </div>
      <form id="email-form">
        <div class="modal-body">
          <p id="modal-recipient" class="text-muted" style="margin:0 0 18px"></p>
          <div class="form-group">
            <label class="form-label" for="email-subject">Subject</label>
            <input type="text" id="email-subject" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email-body">Message</label>
            <textarea id="email-body" class="form-control" style="min-height:160px" required></textarea>
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Attach Files</label>
            <input type="file" id="file-input" hidden multiple>
            <button type="button" class="btn btn-outline btn-sm" id="attach-files-btn">
              <i data-lucide="paperclip" style="width:13px;height:13px"></i>
              Attach Files
            </button>
            <div id="file-list" style="display:flex;flex-direction:column;gap:8px;margin-top:12px"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="cancel-email-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="send-btn">
            <i data-lucide="send" style="width:14px;height:14px"></i>
            Send Email
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/mock-boot.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/users-page.js"></script>
</body>
</html>
