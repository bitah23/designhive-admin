<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-guard.js"></script>
  <title>Settings - DesignHive Admin</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">

        <!-- Admin Management -->
        <div class="card mb-4" style="padding:20px 22px">
          <div class="flex-between mb-4" style="padding-bottom:14px;border-bottom:1px solid var(--border)">
            <div class="flex-center gap-2">
              <div style="background:var(--gold-dim);border-radius:9px;padding:8px;display:flex">
                <i data-lucide="users" style="width:18px;height:18px;color:var(--gold)"></i>
              </div>
              <div>
                <div style="font-weight:700;color:#fff;font-size:0.9rem">Admin Accounts</div>
                <div style="font-size:0.78rem;color:var(--text-muted)">Manage who has access to this dashboard</div>
              </div>
            </div>
            <button class="btn btn-secondary btn-sm" id="refresh-admins-btn" onclick="loadAdmins()">
              <i data-lucide="refresh-cw" style="width:13px;height:13px"></i> Refresh
            </button>
          </div>

          <!-- Add Admin Form -->
          <div style="padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px">
            <div class="label-upper mb-3">Add New Admin</div>
            <form id="add-admin-form"
              style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end">
              <div>
                <label class="form-label" for="new-name">Name</label>
                <input type="text" id="new-name" class="form-control" placeholder="Full name">
              </div>
              <div>
                <label class="form-label" for="new-email">Email *</label>
                <input type="email" id="new-email" class="form-control" placeholder="admin@example.com" required>
              </div>
              <div>
                <label class="form-label" for="new-password">Password *</label>
                <!-- Password field with show/hide toggle -->
                <div style="position:relative">
                  <input type="password" id="new-password" class="form-control" placeholder="Min. 8 characters" required
                    minlength="8" style="padding-right:38px">
                  <button type="button" onclick="
                    var f=document.getElementById('new-password');
                    f.type=f.type==='password'?'text':'password';
                    this.innerHTML=f.type==='password'
                      ?'<i data-lucide=\'eye\' style=\'width:14px;height:14px\'></i>'
                      :'<i data-lucide=\'eye-off\' style=\'width:14px;height:14px\'></i>';
                    if(typeof lucide!=='undefined')lucide.createIcons();"
                    style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;display:flex;align-items:center">
                    <i data-lucide="eye" style="width:14px;height:14px"></i>
                  </button>
                </div>
              </div>
              <button type="submit" class="btn btn-primary" id="add-admin-btn">
                <i data-lucide="user-plus" style="width:15px;height:15px"></i> Add
              </button>
            </form>
          </div>

          <!-- Admin List -->
          <div>
            <div class="label-upper mb-3">Existing Admins</div>
            <div id="admin-list">
              <div class="skeleton" style="height:56px;margin-bottom:8px"></div>
              <div class="skeleton" style="height:56px"></div>
            </div>
          </div>
        </div>

        <!-- Change Password -->
        <div class="card" style="padding:20px 22px">
          <div class="flex-center gap-2 mb-4" style="padding-bottom:14px;border-bottom:1px solid var(--border)">
            <div style="background:var(--gold-dim);border-radius:9px;padding:8px;display:flex">
              <i data-lucide="shield" style="width:18px;height:18px;color:var(--gold)"></i>
            </div>
            <span style="font-weight:700;color:#fff;font-size:0.9rem">Change Password</span>
          </div>

          <!-- Idle state -->
          <div id="pw-step-idle">
            <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:16px">
              A 6-digit verification code will be sent to your registered email address.
            </p>
            <button class="btn btn-outline" id="send-otp-btn" onclick="sendOtp()">
              <i data-lucide="mail" style="width:15px;height:15px"></i> Send Reset Code
            </button>
          </div>

          <!-- Sent state -->
          <form id="pw-step-form" style="display:none" onsubmit="confirmReset(event)">
            <div style="display:grid;grid-template-columns:220px 1fr 1fr;gap:14px;align-items:end">
              <div>
                <label class="form-label" for="otp-input">Verification Code</label>
                <input type="text" id="otp-input" class="form-control" placeholder="6-digit code" maxlength="6" required
                  inputmode="numeric">
              </div>
              <div>
                <label class="form-label" for="new-pw">New Password</label>
                <input type="password" id="new-pw" class="form-control" placeholder="Min. 8 characters" required
                  minlength="8">
              </div>
              <div>
                <label class="form-label" for="confirm-pw">Confirm Password</label>
                <div style="position:relative">
                  <input type="password" id="confirm-pw" class="form-control" placeholder="Repeat password" required
                    style="padding-right:38px">
                  <!-- Single toggle affects both pw fields -->
                  <button type="button" id="pw-eye-btn" onclick="togglePwVisibility(this)"
                    style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;display:flex;align-items:center">
                    <i data-lucide="eye" style="width:14px;height:14px"></i>
                  </button>
                </div>
              </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px">
              <button type="submit" class="btn btn-primary" id="update-pw-btn">
                <i data-lucide="save" style="width:14px;height:14px"></i> Update Password
              </button>
              <button type="button" class="btn btn-secondary" onclick="cancelReset()">Cancel</button>
            </div>
          </form>
        </div>

      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/mock-boot.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/settings-page.js"></script>
</body>

</html>
