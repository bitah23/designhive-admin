<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-guard.js"></script>
  <title>Logs - DesignHive Admin</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">
        <div class="page-header">
          <div>
            <h1>Email Logs</h1>
            <p>Full history of sent emails, outcomes, and delivery issues.</p>
          </div>
          <div class="flex-center gap-2">
            <span id="updated-label" class="updated-just-now">Updated just now</span>
            <button class="btn btn-secondary" type="button" id="refresh-btn">
              <i data-lucide="refresh-cw" style="width:14px;height:14px" id="refresh-icon"></i>
              Refresh
            </button>
          </div>
        </div>

        <div class="flex-between" style="gap:12px;flex-wrap:wrap;margin-bottom:16px">
          <div class="flex gap-2" style="flex-wrap:wrap">
            <div class="input-wrap" style="width:168px">
              <span class="icon"><i data-lucide="filter" style="width:13px;height:13px"></i></span>
              <select id="status-filter">
                <option value="all">All Status</option>
                <option value="sent">Sent</option>
                <option value="failed">Failed</option>
              </select>
            </div>
            <div class="input-wrap" style="width:160px">
              <span class="icon"><i data-lucide="calendar" style="width:13px;height:13px"></i></span>
              <select id="date-filter">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
              </select>
            </div>
          </div>
          <div class="flex gap-3">
            <div class="badge badge-green"><span id="sent-count">0</span> Sent</div>
            <div class="badge badge-red"><span id="failed-count">0</span> Failed</div>
          </div>
        </div>

        <div class="card" id="logs-card">
          <div style="padding:16px">
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
            <div class="skeleton users-skeleton-row"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/logs-page.js"></script>
</body>
</html>
