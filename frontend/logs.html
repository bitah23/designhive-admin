<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs — DesignHive Admin</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="main-area">
      <div id="topbar"></div>
      <main class="page-content">

        <div class="page-header">
          <div>
            <h1>Email Logs</h1>
            <p>Full history of every email sent</p>
          </div>
          <button class="btn btn-secondary" id="refresh-btn" onclick="fetchLogs(true)">
            <i data-lucide="refresh-cw" style="width:14px;height:14px" id="refresh-icon"></i>
            Refresh
          </button>
        </div>

        <!-- Filters + Counts -->
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
          <div style="display:flex;gap:10px">
            <div class="input-wrap" style="width:168px">
              <span class="icon"><i data-lucide="filter" style="width:13px;height:13px;color:var(--gold)"></i></span>
              <select id="status-filter" onchange="applyFilters()">
                <option value="all">All Status</option>
                <option value="sent">Sent Only</option>
                <option value="failed">Failed Only</option>
              </select>
            </div>
            <div class="input-wrap" style="width:160px">
              <span class="icon"><i data-lucide="calendar" style="width:13px;height:13px;color:var(--gold)"></i></span>
              <select id="date-filter" onchange="applyFilters()">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
              </select>
            </div>
          </div>
          <div style="display:flex;gap:20px;align-items:center">
            <div class="flex-center gap-2">
              <i data-lucide="check-circle" style="width:14px;height:14px;color:var(--gold)"></i>
              <span id="sent-count" style="font-weight:700;color:var(--gold)">0</span>
              <span style="font-size:0.78rem;color:var(--text-muted)">sent</span>
            </div>
            <div class="flex-center gap-2">
              <i data-lucide="x-circle" style="width:14px;height:14px;color:var(--danger)"></i>
              <span id="failed-count" style="font-weight:700;color:var(--danger)">0</span>
              <span style="font-size:0.78rem;color:var(--text-muted)">failed</span>
            </div>
          </div>
        </div>

        <div class="card" id="logs-card">
          <div style="padding:16px"><div class="skeleton" style="height:300px"></div></div>
        </div>

      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/logs.js"></script>
</body>
</html>
