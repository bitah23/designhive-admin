<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Background -->
  <rect width="600" height="200" fill="#f7f9ff"/>

  <!-- Soft background blobs -->
  <circle cx="210" cy="95"  r="85" fill="#efc94c" fill-opacity="0.045"/>
  <circle cx="400" cy="105" r="68" fill="#efc94c" fill-opacity="0.06"/>

  <!-- ── Main speech bubble ── white, amber border -->
  <!-- Shape: rounded rect body + tail pointing down-left -->
  <path d="
    M140,38
    Q122,38 122,56
    L122,138
    Q122,156 140,156
    L152,156
    L136,180
    L178,156
    L298,156
    Q316,156 316,138
    L316,56
    Q316,38 298,38
    Z"
    fill="white"
    stroke="#efc94c" stroke-width="1.5" stroke-opacity="0.42" stroke-linejoin="round"/>

  <!-- Typing dots inside main bubble -->
  <circle cx="195" cy="97" r="8" fill="#efc94c" fill-opacity="0.45"/>
  <circle cx="219" cy="97" r="8" fill="#efc94c" fill-opacity="0.7"/>
  <circle cx="243" cy="97" r="8" fill="#efc94c" fill-opacity="0.95"/>

  <!-- ── Secondary bubble ── amber-tint, amber border -->
  <path d="
    M334,52
    Q318,52 318,68
    L318,138
    Q318,154 334,154
    L448,154
    L464,178
    L464,154
    L466,154
    Q482,154 482,138
    L482,68
    Q482,52 466,52
    Z"
    fill="#fff8e6"
    stroke="#efc94c" stroke-width="1.5" stroke-opacity="0.55" stroke-linejoin="round"/>

  <!-- Checkmark inside secondary bubble -->
  <polyline points="356,103 385,128 434,72"
            fill="none"
            stroke="#efc94c" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative stars -->
  <!-- Top-left -->
  <path d="M72,55 L74.1,61.2 L80.5,61.2 L75.5,65 L77.5,71.2
           L72,67.5 L66.5,71.2 L68.5,65 L63.5,61.2 L69.9,61.2 Z"
        fill="#efc94c" fill-opacity="0.35"/>
  <!-- Top-right -->
  <path d="M528,50 L530.1,56.2 L536.5,56.2 L531.5,60 L533.5,66.2
           L528,62.5 L522.5,66.2 L524.5,60 L519.5,56.2 L525.9,56.2 Z"
        fill="#efc94c" fill-opacity="0.35"/>

  <!-- Edge dots -->
  <circle cx="38"  cy="100" r="3" fill="#efc94c" fill-opacity="0.18"/>
  <circle cx="562" cy="100" r="3" fill="#efc94c" fill-opacity="0.18"/>
  <circle cx="300" cy="185" r="2.5" fill="#efc94c" fill-opacity="0.14"/>
</svg>
