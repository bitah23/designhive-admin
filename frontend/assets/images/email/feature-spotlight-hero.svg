<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#fff9ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#fbg)"/>

  <!-- Background glow blobs -->
  <circle cx="130" cy="95" r="72" fill="#efc94c" fill-opacity="0.05"/>
  <circle cx="300" cy="95" r="80" fill="#efc94c" fill-opacity="0.07"/>
  <circle cx="470" cy="95" r="72" fill="#efc94c" fill-opacity="0.05"/>

  <!-- ── Feature 1: Design Tools ── center (130, 95) -->
  <circle cx="130" cy="95" r="44" fill="white" stroke="#efc94c" stroke-width="1.5" stroke-opacity="0.45"/>
  <!-- 2×2 grid icon (design palette metaphor) -->
  <rect x="116" y="81" width="12" height="12" rx="2" fill="#efc94c" fill-opacity="0.9"/>
  <rect x="132" y="81" width="12" height="12" rx="2" fill="#efc94c" fill-opacity="0.5"/>
  <rect x="116" y="97" width="12" height="12" rx="2" fill="#efc94c" fill-opacity="0.5"/>
  <rect x="132" y="97" width="12" height="12" rx="2" fill="#efc94c" fill-opacity="0.8"/>
  <!-- Label -->
  <text x="130" y="153"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" font-weight="700" letter-spacing="0.06em" fill="#555555">DESIGN TOOLS</text>

  <!-- ── Feature 2: AI Generation ── center (300, 95) — main/hero -->
  <!-- Outer glow ring -->
  <circle cx="300" cy="95" r="52" fill="#efc94c" fill-opacity="0.1" stroke="#efc94c" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Inner fill -->
  <circle cx="300" cy="95" r="38" fill="#efc94c" fill-opacity="0.12"/>
  <!-- 5-point star icon -->
  <path d="M300,71 L305.5,86.4 L321.9,86.4 L308.7,96.2 L313.9,111.6
           L300,101.9 L286.1,111.6 L291.3,96.2 L278.1,86.4 L294.5,86.4 Z"
        fill="#efc94c"/>
  <!-- Label -->
  <text x="300" y="162"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" font-weight="700" letter-spacing="0.06em" fill="#333333">AI GENERATION</text>

  <!-- ── Feature 3: Templates ── center (470, 95) -->
  <circle cx="470" cy="95" r="44" fill="white" stroke="#efc94c" stroke-width="1.5" stroke-opacity="0.45"/>
  <!-- Document / template icon -->
  <rect x="456" y="76" width="28" height="38" rx="3" fill="none" stroke="#efc94c" stroke-width="1.8" stroke-opacity="0.7"/>
  <line x1="462" y1="88" x2="478" y2="88" stroke="#efc94c" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="462" y1="96" x2="478" y2="96" stroke="#efc94c" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="462" y1="104" x2="472" y2="104" stroke="#efc94c" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Label -->
  <text x="470" y="153"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" font-weight="700" letter-spacing="0.06em" fill="#555555">TEMPLATES</text>

  <!-- Edge dots -->
  <circle cx="35"  cy="100" r="3"   fill="#efc94c" fill-opacity="0.2"/>
  <circle cx="565" cy="100" r="3"   fill="#efc94c" fill-opacity="0.2"/>
  <circle cx="200" cy="178" r="2.5" fill="#efc94c" fill-opacity="0.15"/>
  <circle cx="400" cy="178" r="2.5" fill="#efc94c" fill-opacity="0.15"/>
  <circle cx="200" cy="20"  r="2"   fill="#efc94c" fill-opacity="0.15"/>
  <circle cx="400" cy="20"  r="2"   fill="#efc94c" fill-opacity="0.15"/>
</svg>
